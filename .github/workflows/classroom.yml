name: GitHub Classroom Workflow

on: [push]


permissions:
  checks: write
  actions: read
  contents: read

jobs:
  Autograding:
    runs-on: ubuntu-latest
    steps:
      - name: Set-up for grading
        uses: ImperialCollegeLondon/y2cl-setup@v2.0.0
        with:
          project: ProjectA
          src_dir: raytracer
          python_version: 3.12
      - name: run grading
        id: run-tests
        uses: alexanderrichards/pytest-ghclassroom-autograder@v1.0.0
        with:
          timeout: 10
      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          RUN-TESTS_RESULTS: "${{steps.run-tests.outputs.result}}"
        with:
          runners: run-tests
